name: Mobile Nightly Full Matrix

on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:

jobs:
  nightly-full-matrix:
    name: Nightly Full Matrix (Tier A + Tier B)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium webkit
      - run: npm run test:mobile:full
      - run: npm run build
      - run: npm run test:mobile:perf
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-mobile-artifacts
          path: |
            artifacts
            .lighthouseci
          if-no-files-found: ignore
